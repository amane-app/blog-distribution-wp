name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer update --prefer-dist --no-progress
      - name: Unit tests
        run: composer test:unit

  coverage:
    name: Coverage gate (90%)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
          tools: composer:v2
          extensions: mysqli, pdo_mysql
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Install subversion (required by install-wp-tests.sh)
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: Install WP test suite
        run: |
          chmod +x bin/install-wp-tests.sh
          bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 latest
      - name: Run coverage gate
        run: composer test:cov

  e2e:
    name: E2E (Playwright + wp-env)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Install plugin runtime deps (wp-env mounts vendor/)
        run: composer install --no-dev --prefer-dist --no-progress
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install npm deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start wp-env
        run: npm run env:start
      - name: Run E2E
        run: npm run test:e2e
      - name: Stop wp-env
        if: always()
        run: npm run env:stop
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
